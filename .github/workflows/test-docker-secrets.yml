# Test Docker Hub secrets configuration
name: 🔐 Test Docker Hub Connection

on:
  workflow_dispatch:

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_NAMESPACE: gemneye  
  IMAGE_NAME: moda-runpod

jobs:
  test-secrets:
    name: 🧪 Test Docker Hub Authentication
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔐 Test Docker Hub Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: ✅ Login Successful
        run: |
          echo "✅ Docker Hub authentication successful!"
          echo "Registry: ${{ env.DOCKER_REGISTRY }}"
          echo "Namespace: ${{ env.DOCKER_NAMESPACE }}"
          echo "Target: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}"
          
      - name: 🔍 Test Registry Access
        run: |
          echo "Testing registry access..."
          docker pull hello-world
          docker tag hello-world ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/test:latest
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/test:latest
          docker rmi ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/test:latest
          echo "✅ Registry push/pull test successful!"