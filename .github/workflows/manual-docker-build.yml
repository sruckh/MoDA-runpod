# Manual Docker Build and Push - Simple Test
name: 🎯 Manual Docker Build & Push

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: 'Tag suffix (e.g., test, manual)'
        required: false
        default: 'manual-test'

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_NAMESPACE: gemneye
  IMAGE_NAME: moda-runpod

jobs:
  manual-build-push:
    name: 🚀 Manual Build & Push
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        
      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: 🔍 Environment Debug
        run: |
          echo "🔍 Build Environment:"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Tag suffix: ${{ github.event.inputs.tag_suffix }}"
          echo "Target image: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag_suffix }}"
          
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: 🏗️ Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag_suffix }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            PYTHON_VERSION=3.10
            PYTORCH_VERSION=2.7.1
            CUDA_VERSION=128
            FLASH_ATTN_VERSION=2.8.2
            
      - name: ✅ Verify Deployment
        run: |
          echo "🎉 Build and push completed!"
          echo "Image deployed to:"
          echo "- ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag_suffix }}"
          echo "- ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "Docker Hub URL: https://hub.docker.com/r/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}/tags"
          echo ""
          echo "🔍 Inspecting pushed image..."
          docker buildx imagetools inspect ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest